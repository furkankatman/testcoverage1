name: Build Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: testcoverage1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with Coverage
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --settings ../.runSettings

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: |
          reportgenerator \
            -reports:../TestProject1/TestResults/**/coverage.cobertura.xml \
            -targetdir:coveragereport \
            -reporttypes:"Html;JsonSummary" \
            -filefilters:-*Program.cs

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport

      - name: Extract coverage
        id: coverage
        run: |
          VALUE=$(jq -r '.LineCoverage' coveragereport/Summary.json)
          echo "coverage=$VALUE" >> $GITHUB_OUTPUT
          
      
       - name: Debug files
         run: |
           pwd
           echo "-----"
           find . -name "Summary.json"


      - name: Comment PR
        if: github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ✅ Test Coverage: **${{ steps.coverage.outputs.coverage }}%**
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}